# Custom Language File for Launcher Customizer

[ejs.app]
title = "Oreon Launcher"

[ejs.landing]
mediaGitHubURL = "https://github.com/60zz/OreonLauncher"
mediaTwitterURL = "https://x.com/Oreon_ABYSS/"
mediaInstagramURL = "https://www.tiktok.com/@oreon.abyss"
mediaYouTubeURL = "https://www.youtube.com/channel/UC6ACK0XVNBqBovHI7394zqg"
mediaDiscordURL = "https://discord.gg/oreon"
mediaWebsiteURL = "https://oreon.minecart.com.br"

[ejs.settings]
sourceGithubLink = "https://github.com/60zz/OreonLauncher"
supportLink = "https://github.com/60zz/SSMPLauncher/issues"
