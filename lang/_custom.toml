changeLanguageTitle = "Change the launcher language"
changeLanguageDesc = "You can change the language in the list below. This text will not change if you change the language so you can find your wayback here to change it back"

[ejs.welcome]
welcomeHeader = "BEM VINDO A OREON"
welcomeDescription = "Seja muito bem vindo(a), meu caro Aventureiro... Você não precisa saber quem eu sou, mas precisa saber que eu estou te observando a todo instante... Eu não vou te causar mal algum, a não ser que seja necessário, e eu julgo que não será. Espero que aproveite sua vinda à Abyss! Será muito divertido..."

[ejs.overlay]
changedLanguageHeader = "You changed the previous language"