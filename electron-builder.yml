appId: 'oreonlauncher'
productName: 'Oreon Launcher'
artifactName: 'Oreon-Launcher-setup-${version}.${ext}'

copyright: 'Copyright (c) 2026 Oreon'

asar: true
compression: 'maximum'

files:
  - '!{dist,OreonLauncher,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,.eslintrc.json}'

extraResources:
  - 'libraries'

# Windows Configuration
win: 
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux: 
  target: 'AppImage'
  maintainer: 'Oreon'
  vendor: 'Oreon'
  synopsis: 'Oreon Minecraft Launcher'
  description: 'Launcher oficial do servidor Oreon Roleplay RPG medieval. Mods, configuracoes e Java sao gerenciados automaticamente.'
  category: 'Game'


directories:
  buildResources: 'build'
  output: 'dist'

publish:
  provider: 'github'
  owner: 'Ucasplayer'
  repo: 'OreonLauncher'
