# Custom Language File for Launcher Customizer

[ejs.app]
title = "Oreon Launcher"

[ejs.landing]
mediaGitHubURL = "#"
mediaTwitterURL = "https://x.com/JogarOreon"
mediaTikTokURL = "https://www.tiktok.com/@jogaroreon"
mediaYouTubeURL = "https://www.youtube.com/@oreonSMP"
mediaDiscordURL = "https://discord.gg/oreon"

[ejs.login]
loginSubheader = "LOGIN DO MINECRAFT"
loginEmailPlaceholder = "E-MAIL OU USUARIO"

[ejs.loginOptions]
loginWithOffline = "Entrar Offline"

[ejs.settings]
mojangAccount = "Offline"
addMojangAccount = "+ Adicionar Conta Offline"
sourceGithubLink = "#"
supportLink = "#"

[ejs.welcome]
welcomeHeader = "BEM-VINDO AO OREON"
welcomeDescription = "Entre em um mundo medieval de roleplay e RPG, preparado para que os jogadores acessem o servidor com os mods certos, Java compativel e configuracoes prontas."
welcomeDescCTA = "Voce esta a poucos cliques de entrar no Oreon."

[js.landing.discord]
joining = "Entrando em Oreon!"
joined = "Explorando Oreon!"

[js.landing.systemScan]
javaRequiredMessage = "Uma instalacao x64 valida do Java {major} e necessaria para iniciar o Oreon."

[js.landing.dlAsync]
launchWrapperNotDownloaded = "Um arquivo essencial do carregador de mods nao foi baixado corretamente. Verifique sua conexao, antivirus e tente iniciar novamente."

[js.login.offline]
subheader = "LOGIN OFFLINE"
usernamePlaceholder = "USUARIO"

[js.login.error]
invalidUsername = "* Use 1-16 letras, numeros ou _"

[js.auth.offline.error]
invalidUsernameTitle = "Usuario offline invalido"
invalidUsernameDesc = "Use apenas letras, numeros ou underline. O usuario deve ter de 1 a 16 caracteres."
